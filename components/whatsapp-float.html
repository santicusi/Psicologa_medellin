     WHATSAPP FLOAT — Botón flotante
     ============================================ -->
<style>
.whatsapp-float {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 900;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #25D366;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 24px rgba(37,211,102,0.4);
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
  opacity: 0;
  transform: scale(0.5);
}

.whatsapp-float--visible {
  opacity: 1;
  transform: scale(1);
}

.whatsapp-float:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 32px rgba(37,211,102,0.5);
}

.whatsapp-float svg {
  width: 30px;
  height: 30px;
  fill: #ffffff;
}

/* Pulso */
.whatsapp-float::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: #25D366;
  z-index: -1;
  animation: waPulse 2s ease-out infinite;
}

@keyframes waPulse {
  0% {
    transform: scale(1);
    opacity: 0.5;
  }
  100% {
    transform: scale(1.6);
    opacity: 0;
  }
}

/* Tooltip */
.whatsapp-float__tooltip {
  position: absolute;
  right: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%);
  background: #ffffff;
  color: #1e293b;
  padding: 0.5rem 1rem;
  border-radius: 8px;
  font-family: 'Raleway', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  opacity: 0;
  visibility: hidden;
  transition: all 0.25s ease;
}

.whatsapp-float__tooltip::after {
  content: '';
  position: absolute;
  left: 100%;
  top: 50%;
  transform: translateY(-50%);
  border: 6px solid transparent;
  border-left-color: #ffffff;
}

.whatsapp-float:hover .whatsapp-float__tooltip {
  opacity: 1;
  visibility: visible;
}

@media (max-width: 768px) {
  .whatsapp-float {
    bottom: 1.25rem;
    right: 1.25rem;
    width: 54px;
    height: 54px;
  }

  .whatsapp-float svg {
    width: 26px;
    height: 26px;
  }

  .whatsapp-float__tooltip {
    display: none;
  }
}
</style>
